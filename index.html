<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Moz Studio</title>

<link rel="icon" type="image/png" href="images/icon.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

<style>

:root{

--bg:#f3f7fc;
--bg2:#edf4ff;

--card:#ffffff;
--card2:rgba(255,255,255,.72);

--text:#081120;
--muted:#64748b;

--primary:#2563eb;
--primary2:#60a5fa;

--border:rgba(15,23,42,.08);

--shadow:
0 10px 30px rgba(15,23,42,.06),
0 20px 60px rgba(15,23,42,.06);

--footer:
linear-gradient(
135deg,
#0f172a,
#1e3a8a,
#2563eb
);

--success:#10b981;

}

*{
margin:0;
padding:0;
box-sizing:border-box;

-webkit-tap-highlight-color:transparent;

user-select:none;
-webkit-user-select:none;
}

input,
textarea{
user-select:text;
-webkit-user-select:text;
}

html{
scroll-behavior:smooth;
}

body{

font-family:'Inter',sans-serif;

background:
radial-gradient(circle at top left, rgba(96,165,250,.12), transparent 30%),
radial-gradient(circle at bottom right, rgba(37,99,235,.10), transparent 30%),
var(--bg);

color:var(--text);

overflow-x:hidden;

}

/* BLOBS */

.blob{
position:fixed;
border-radius:50%;
filter:blur(90px);
z-index:-1;
opacity:.5;
animation:floatBlob 10s ease-in-out infinite;
}

.blob1{
width:380px;
height:380px;
background:#60a5fa;
top:-100px;
left:-100px;
}

.blob2{
width:300px;
height:300px;
background:#3b82f6;
right:-100px;
top:40%;
animation-delay:2s;
}

.blob3{
width:260px;
height:260px;
background:#93c5fd;
bottom:-100px;
left:35%;
animation-delay:4s;
}

@keyframes floatBlob{
0%{transform:translateY(0px);}
50%{transform:translateY(-25px);}
100%{transform:translateY(0px);}
}

a{
text-decoration:none;
color:inherit;
}

img{
pointer-events:none;
-webkit-user-drag:none;
}

button{
font-family:inherit;
border:none;
outline:none;
cursor:pointer;
}

.container{
width:min(1200px,92%);
margin:auto;
}

/* NAVBAR */

.navbar{

position:sticky;
top:0;

z-index:999;

padding:16px 0;

background:rgba(255,255,255,.55);

backdrop-filter:blur(18px);
-webkit-backdrop-filter:blur(18px);

border-bottom:1px solid var(--border);

}

.nav-wrap{
display:flex;
align-items:center;
justify-content:space-between;
gap:20px;
}

.logo{
display:flex;
align-items:center;
gap:14px;
font-weight:800;
font-size:1.15rem;
}

.logo img{
width:48px;
height:48px;
border-radius:16px;
box-shadow:0 10px 20px rgba(37,99,235,.25);
}

.nav-links{
display:flex;
align-items:center;
gap:10px;
}

.nav-links a{

padding:12px 16px;

border-radius:16px;

font-weight:600;

transition:.3s ease;

}

.nav-links a:hover{

background:rgba(96,165,250,.14);

color:var(--primary);

transform:translateY(-2px);

}

.nav-actions{
display:flex;
align-items:center;
gap:12px;
}

.login-btn{

height:52px;

padding:0 20px;

border-radius:18px;

font-weight:700;

background:
linear-gradient(135deg,var(--primary),var(--primary2));

color:white;

box-shadow:
0 15px 35px rgba(37,99,235,.26);

transition:.3s ease;

}

.login-btn:hover{
transform:translateY(-3px);
}

/* USER PANEL */

.user-panel{

display:none;
align-items:center;
gap:12px;

padding:8px 14px;

border-radius:22px;

background:rgba(255,255,255,.75);

backdrop-filter:blur(16px);

border:1px solid var(--border);

position:relative;

cursor:pointer;

}

.user-panel img{
width:44px;
height:44px;
border-radius:50%;
object-fit:cover;
}

.status-dot{
width:10px;
height:10px;
background:var(--success);
border-radius:50%;
box-shadow:0 0 15px var(--success);
}

.dropdown{

position:absolute;

top:70px;
right:0;

width:260px;

background:white;

border:1px solid var(--border);

border-radius:24px;

padding:20px;

box-shadow:var(--shadow);

display:none;

animation:dropdown .3s ease;

}

.dropdown.active{
display:block;
}

@keyframes dropdown{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* HERO */

.hero{
padding:90px 0 70px;
}

.hero-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:70px;
align-items:center;
}

.badge{

display:inline-flex;
align-items:center;
gap:10px;

padding:14px 18px;

background:rgba(255,255,255,.6);

backdrop-filter:blur(16px);

border:1px solid rgba(255,255,255,.35);

border-radius:999px;

font-weight:700;

color:var(--primary);

margin-bottom:26px;

box-shadow:var(--shadow);

}

.hero h1{

font-size:4.7rem;
line-height:1.02;

letter-spacing:-3px;

margin-bottom:24px;

font-weight:900;

}

.hero p{

font-size:1.1rem;
line-height:1.9;

color:var(--muted);

max-width:580px;

}

.hero-buttons{
display:flex;
flex-wrap:wrap;
gap:16px;
margin-top:34px;
}

.btn{

height:58px;

padding:0 26px;

border-radius:20px;

font-weight:700;

transition:.35s ease;

position:relative;
overflow:hidden;

}

.btn::before{
content:"";
position:absolute;
inset:0;
background:linear-gradient(
120deg,
transparent,
rgba(255,255,255,.2),
transparent
);
transform:translateX(-120%);
transition:.6s ease;
}

.btn:hover::before{
transform:translateX(120%);
}

.btn-primary{

background:
linear-gradient(135deg,var(--primary),var(--primary2));

color:white;

box-shadow:
0 15px 35px rgba(37,99,235,.28);

}

.btn-primary:hover{
transform:translateY(-4px) scale(1.03);
}

.btn-secondary{

background:rgba(255,255,255,.75);

backdrop-filter:blur(16px);

border:1px solid var(--border);

color:var(--text);

}

.btn-secondary:hover{
transform:translateY(-4px);
box-shadow:var(--shadow);
}

/* HERO VISUAL */

.hero-visual{
position:relative;
height:580px;
}

.hero-card{

position:absolute;

inset:40px;

background:rgba(255,255,255,.7);

backdrop-filter:blur(20px);

border-radius:36px;

border:1px solid var(--border);

box-shadow:var(--shadow);

overflow:hidden;

animation:floatCard 6s ease-in-out infinite;

}

@keyframes floatCard{
0%{transform:translateY(0px);}
50%{transform:translateY(-10px);}
100%{transform:translateY(0px);}
}

.fake-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
padding:35px;
}

.fake-box{
height:100px;
background:white;
border-radius:24px;
box-shadow:var(--shadow);
}

.phone{

position:absolute;

right:30px;
bottom:20px;

width:220px;
height:430px;

background:#ffffff;

border:10px solid #0f172a;

border-radius:44px;

overflow:hidden;

box-shadow:
0 30px 60px rgba(0,0,0,.22);

animation:floatPhone 5s ease-in-out infinite;

}

@keyframes floatPhone{
0%{transform:translateY(0px);}
50%{transform:translateY(-16px);}
100%{transform:translateY(0px);}
}

.phone::before{
content:"";
position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
width:120px;
height:24px;
background:#0f172a;
border-radius:999px;
}

.phone-content{
padding:70px 16px 16px;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
}

.phone-box{
height:80px;
border-radius:18px;
background:#f1f5f9;
}

.float-icon{

position:absolute;

width:70px;
height:70px;

border-radius:24px;

background:rgba(255,255,255,.8);

backdrop-filter:blur(16px);

display:flex;
align-items:center;
justify-content:center;

font-size:1.5rem;

box-shadow:var(--shadow);

color:var(--primary);

border:1px solid var(--border);

animation:floatMini 4s ease-in-out infinite;

}

.float1{
left:0;
bottom:80px;
}

.float2{
right:0;
top:80px;
animation-delay:1s;
}

.float3{
top:0;
left:50%;
animation-delay:2s;
}

@keyframes floatMini{
0%{transform:translateY(0px);}
50%{transform:translateY(-12px);}
100%{transform:translateY(0px);}
}

/* SECTION */

.section{
padding:40px 0;
}

.section-box{

background:rgba(255,255,255,.72);

backdrop-filter:blur(20px);

border-radius:34px;

border:1px solid var(--border);

padding:34px;

box-shadow:var(--shadow);

}

.section-header{
display:flex;
align-items:center;
justify-content:space-between;
margin-bottom:28px;
}

.section-header h2{
font-size:1.45rem;
}

.section-header a{
font-weight:700;
color:var(--primary);
}

/* CARDS */

.channels-grid,
.category-grid{
display:grid;
gap:22px;
}

.channels-grid{
grid-template-columns:repeat(4,1fr);
}

.category-grid{
grid-template-columns:repeat(5,1fr);
}

.card{

background:white;

border:1px solid var(--border);

border-radius:28px;

padding:26px;

transition:.35s ease;

cursor:pointer;

}

.card:hover{

transform:
translateY(-10px)
scale(1.02);

box-shadow:
0 25px 50px rgba(15,23,42,.12);

}

.icon-wrap{

width:66px;
height:66px;

border-radius:50%;

display:flex;
align-items:center;
justify-content:center;

font-size:1.35rem;

color:white;

margin-bottom:20px;

}

.blue{
background:linear-gradient(135deg,#2563eb,#60a5fa);
}

.green{
background:linear-gradient(135deg,#10b981,#34d399);
}

.purple{
background:linear-gradient(135deg,#7c3aed,#a78bfa);
}

.orange{
background:linear-gradient(135deg,#f59e0b,#fbbf24);
}

.card h3{
margin-bottom:12px;
}

.card p{
line-height:1.8;
font-size:.96rem;
color:var(--muted);
}

.member{
margin-top:18px;
font-weight:700;
color:#94a3b8;
}

/* ABOUT */

.about-grid{
display:grid;
grid-template-columns:1.1fr .9fr;
gap:24px;
}

.stats{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:18px;
margin-top:24px;
}

.stat{

background:white;

padding:24px;

border-radius:24px;

border:1px solid var(--border);

}

.stat h3{
font-size:2rem;
color:var(--primary);
margin-bottom:8px;
}

/* FOOTER */

.footer{

margin-top:90px;

background:
linear-gradient(
135deg,
#0f172a,
#1e3a8a,
#2563eb
);

border-radius:40px 40px 0 0;

padding:80px 0 130px;

position:relative;

overflow:hidden;

}

.footer-grid{
display:grid;
grid-template-columns:1.2fr repeat(3,.7fr) 1fr;
gap:30px;
}

.footer h4{
color:white;
margin-bottom:20px;
}

.footer p,
.footer a{
color:#cbd5e1;
line-height:2;
}

.notify-card{

background:rgba(255,255,255,.08);

backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,.08);

padding:24px;

border-radius:28px;

}

.notify-box{
margin-top:18px;
display:flex;
flex-direction:column;
gap:14px;
}

.notify-box input{

height:56px;

padding:0 18px;

border-radius:18px;

background:rgba(255,255,255,.08);

color:white;

border:none;
outline:none;

}

.notify-box input::placeholder{
color:#cbd5e1;
}

.subscribed-box{

display:none;
align-items:center;
gap:14px;

background:rgba(16,185,129,.12);

border:1px solid rgba(16,185,129,.25);

padding:14px;

border-radius:20px;

}

.subscribed-box img{
width:50px;
height:50px;
border-radius:50%;
}

.verified{
color:#10b981;
font-size:.9rem;
}

.footer-bottom{

margin-top:50px;
padding-top:26px;

border-top:1px solid rgba(255,255,255,.08);

display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:20px;

}

.socials{
display:flex;
gap:14px;
}

.socials a{

width:50px;
height:50px;

border-radius:50%;

background:rgba(255,255,255,.08);

display:flex;
align-items:center;
justify-content:center;

transition:.35s ease;

}

.socials a:hover{
transform:translateY(-5px) scale(1.08);
background:rgba(255,255,255,.18);
}

/* MOBILE NAV */

.mobile-nav{

position:fixed;

left:50%;
bottom:18px;

transform:translateX(-50%);

width:92%;
max-width:520px;

height:78px;

background:rgba(255,255,255,.82);

backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,.45);

border-radius:28px;

display:none;

align-items:center;
justify-content:space-around;

z-index:3000;

box-shadow:
0 20px 50px rgba(15,23,42,.16);

padding-bottom:env(safe-area-inset-bottom);

}

.mobile-item{

display:flex;
flex-direction:column;
align-items:center;
gap:6px;

font-size:.8rem;
font-weight:700;

color:var(--muted);

transition:.3s ease;

position:relative;

}

.mobile-item i{
font-size:1.15rem;
}

.mobile-item.active{
color:var(--primary2);
transform:translateY(-4px);
}

/* WEBVIEW */

.webview{

position:fixed;
inset:0;

background:rgba(3,7,18,.55);

backdrop-filter:blur(22px);

z-index:4000;

opacity:0;
pointer-events:none;

transition:.4s ease;

}

.webview.active{
opacity:1;
pointer-events:auto;
}

.webview-panel{

position:absolute;

inset:20px;

background:white;

border-radius:34px;

overflow:hidden;

display:flex;
flex-direction:column;

transform:
translateY(40px)
scale(.96);

transition:.4s ease;

}

.webview.active .webview-panel{
transform:
translateY(0)
scale(1);
}

.webview-top{

height:74px;

display:flex;
align-items:center;
justify-content:space-between;

padding:0 22px;

border-bottom:1px solid var(--border);

background:rgba(255,255,255,.85);

backdrop-filter:blur(18px);

}

.webview-title{
display:flex;
align-items:center;
gap:12px;
font-weight:700;
}

.loading-bar{

height:4px;
width:0%;

background:
linear-gradient(
90deg,
var(--primary),
var(--primary2)
);

transition:width .35s ease;

}

.webview iframe{
flex:1;
border:none;
width:100%;
background:white;
}

.close-btn{

width:48px;
height:48px;

border-radius:18px;

background:#f1f5f9;

transition:.3s ease;

}

.close-btn:hover{
transform:rotate(90deg);
}

/* TOAST */

.toast{

position:fixed;

bottom:110px;
right:20px;

padding:16px 20px;

border-radius:20px;

background:rgba(15,23,42,.92);

color:white;

z-index:6000;

opacity:0;
transform:translateY(20px);

transition:.35s ease;

}

.toast.show{
opacity:1;
transform:translateY(0);
}

/* RESPONSIVE */

@media(max-width:1100px){

.hero-grid,
.about-grid,
.footer-grid{
grid-template-columns:1fr;
}

.channels-grid{
grid-template-columns:repeat(2,1fr);
}

.category-grid{
grid-template-columns:repeat(3,1fr);
}

.hero h1{
font-size:3.9rem;
}

}

@media(max-width:768px){

.nav-links{
display:none;
}

.hero{
padding-top:50px;
}

.hero-grid{
grid-template-columns:1fr;
gap:40px;
}

.hero h1{
font-size:3rem;
}

.hero-visual{
height:440px;
}

.hero-card{
inset:0;
}

.phone{
width:180px;
height:340px;
}

.channels-grid,
.category-grid,
.stats{
grid-template-columns:1fr;
}

.section-box{
padding:24px;
}

.mobile-nav{
display:flex;
}

.footer{
padding-bottom:150px;
}

.webview-panel{
inset:0;
border-radius:0;
}

}

</style>
</head>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
GoogleAuthProvider,
signInWithPopup,
signOut,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
collection,
addDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyCPdiQ65WkraRh4wGmhucCc-SlQNgFu_VU",

authDomain: "mozstudio-6c90d.firebaseapp.com",

projectId: "mozstudio-6c90d",

storageBucket: "mozstudio-6c90d.firebasestorage.app",

messagingSenderId: "961156544144",

appId: "1:961156544144:web:c7cb3ae163e2efeae14a15",

measurementId: "G-Z151SSF1L5"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const provider = new GoogleAuthProvider();

const db = getFirestore(app);

/* LOGIN */

window.googleLogin = async function(){

const loginBtn = document.getElementById("loginBtn");

loginBtn.innerHTML = `
<i class="fa-solid fa-spinner fa-spin"></i>
Loading
`;

try{

await signInWithPopup(auth,provider);

showToast("Successfully logged in");

}catch(error){

console.log(error);

showToast("Login failed");

}

loginBtn.innerHTML = `
<i class="fa-brands fa-google"></i>
Login
`;

}

/* AUTH */

onAuthStateChanged(auth,(user)=>{

if(user){

document.getElementById("loginBtn").style.display = "none";

document.getElementById("userPanel").style.display = "flex";

document.getElementById("userAvatar").src = user.photoURL;

document.getElementById("dropAvatar").src = user.photoURL;

document.getElementById("userName").innerText = user.displayName;

document.getElementById("dropName").innerText = user.displayName;

}else{

document.getElementById("loginBtn").style.display = "block";

document.getElementById("userPanel").style.display = "none";

}

});

/* DROPDOWN */

document.getElementById("userPanel").onclick = function(){

document.getElementById("dropdown")
.classList.toggle("active");

}

/* LOGOUT */

window.logout = async function(){

await signOut(auth);

showToast("Logged out");

}

/* EMAIL SAVE */

window.notifyMe = async function(){

const email =
document.getElementById("emailInput").value.trim();

if(!email || !email.includes("@")){

showToast("Enter valid email");
return;

}

try{

await addDoc(collection(db,"subscribers"),{

email:email,
createdAt:new Date().toISOString()

});

showToast("Email saved");

}catch(error){

console.log(error);

showToast("Failed to save");

}

}

</script>

<script>

/* TOAST */

function showToast(text){

const toast =
document.getElementById("toast");

toast.innerText = text;

toast.classList.add("show");

setTimeout(()=>{

toast.classList.remove("show");

},3000);

}

/* WEBVIEW */

function openWebview(title,url){

const webview =
document.getElementById("webview");

document.getElementById("webviewTitle")
.innerText = title;

const frame =
document.getElementById("webviewFrame");

const bar =
document.getElementById("loadingBar");

bar.style.width = "0%";

webview.classList.add("active");

document.body.style.overflow = "hidden";

setTimeout(()=>{
bar.style.width = "45%";
},120);

setTimeout(()=>{
bar.style.width = "80%";
},400);

frame.src = url;

frame.onload = ()=>{

bar.style.width = "100%";

setTimeout(()=>{
bar.style.width = "0%";
},400);

};

}

/* CLOSE */

function closeWebview(){

document.getElementById("webview")
.classList.remove("active");

document.getElementById("webviewFrame")
.src = "";

document.body.style.overflow = "auto";

}

/* SCROLL */

function scrollToTop(){

window.scrollTo({
top:0,
behavior:"smooth"
});

}

</script>

</body>
